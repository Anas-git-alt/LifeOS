name: ${COMPOSE_PROJECT_NAME:-lifeos-v1-5}

services:
  tts-worker:
    build:
      context: ./tts-worker
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8010"
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ./storage/tts-models:/model-cache
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8010/health', timeout=2)"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - lifeos

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      tts-worker:
        condition: service_healthy
    ports:
      - "127.0.0.1:${BACKEND_PUBLIC_PORT:-8100}:8000"
    volumes:
      - ./storage:/app/storage
      - ./skills:/app/skills
    env_file:
      - .venv/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - lifeos

  discord-bot:
    build:
      context: ./discord-bot
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - .venv/.env
    environment:
      - BACKEND_URL=http://127.0.0.1:${BACKEND_PUBLIC_PORT:-8100}
    network_mode: host

  webui:
    build:
      context: ./webui
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WEBUI_PUBLIC_PORT:-3100}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /usr/share/nginx/html/index.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - lifeos

networks:
  lifeos:
    driver: bridge
