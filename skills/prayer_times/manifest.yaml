name: prayer_times
version: "0.1.0"
description: "Provides Islamic prayer times based on user location"
author: LifeOS
dependencies: []
agent: prayer-deen
triggers:
  - cron: "0 3 *"  # Pre-Fajr
inputs:
  - city
  - country
  - method  # Calculation method (1=MWL, 2=ISNA, etc.)
outputs:
  - prayer_schedule: "Today's prayer times with names and times"
  - next_prayer: "Next upcoming prayer name and time"
tests:
  - tests/test_prayer.py
